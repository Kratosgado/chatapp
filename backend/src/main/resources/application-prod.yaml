logging:
  level:
    com.kratosgado.chatapp: INFO
    org.springframework.web: WARN
server:
  port: 8080

spring:
  application:
    name: chatapp
  main:
    banner-mode: off
    lazy-initialization: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: ${JWT_EXPIRATION_TIME:36000000}
